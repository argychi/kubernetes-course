apiVersion: v1
kind: Pod
metadata:
  name: color-api
  namespace: dev
  labels:
    app: color-api
spec:
  containers:
  - name: color-api
    image: lmacademy/color-api:1.1.0
    resources:
      requests:
        cpu: '200m'
        memory: '256Mi'
      limits:
        memory: "512Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
