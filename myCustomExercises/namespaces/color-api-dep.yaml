apiVersion: apps/v1
kind: Deployment
metadata:
  name: color-api-dep
  namespace: dev 
spec:
  replicas: 4
  selector:
    matchLabels:
      app: color-api
  template:
    metadata:
      labels:
        app: color-api
    spec:
      containers:
      - name: color-api
        image: lmacademy/color-api:1.0.0
        resources:
          requests:
            memory: '256Mi'
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
