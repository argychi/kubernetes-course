apiVersion: v1
kind: Pod
metadata:
  name: mybusybox
  labels:
    app: mybusybox
spec:
  containers:
  - name: busybox-container
    image: busybox:1.36.1
    command:
      - 'sh'
      - '-c'
      - 'echo "$DB_USER" && "$DB_PASS"'
    env:
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          key: username
          name: dbsec
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          key: password
          name: dbsec
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"

