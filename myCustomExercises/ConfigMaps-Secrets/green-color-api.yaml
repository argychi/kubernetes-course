apiVersion: v1
kind: Pod
metadata:
  name: green-config-pod
  labels:
    name: green-config-pod
spec:
  containers:
  - name: green-config-container
    image: lmacademy/color-api:1.3.0
    env:
      - name: COLOR_CONFIG_PATH
        valueFrom:
          configMapKeyRef:
            key: COLOR_CONFIG_PATH
            name: green-config
    volumeMounts:
      - name: color-config
        mountPath: /mnt/config
        readOnly: true
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
  volumes:
    - name: color-config
      configMap:
        name: green-config
