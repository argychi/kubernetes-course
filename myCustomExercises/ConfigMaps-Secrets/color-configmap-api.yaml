apiVersion: v1
kind: Pod
metadata:
  name: color-config-pod
  labels:
    name: color-config-pod
spec:
  containers:
  - name: color-config-container
    image: lmacademy/color-api:1.3.0
    # First method of passing env from configmaps 
    envFrom:
      - configMapRef:
          name: red-configmap
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
    ports:
      - containerPort: 80
