apiVersion: v1
kind: Pod
metadata:
  name: mybusybox
  labels:
    app: mybusybox
spec:
  containers:
  - name: busybox-container
    image: busybox:1.36.1
    command:
      - 'sh'
      - '-c'
      - |
          echo "$username"
          echo "$passowrd"
          sleep 1200
    envFrom:
      - secretRef:
          name: dbsec
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"

